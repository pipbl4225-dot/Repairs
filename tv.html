<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>АВП Технология — TV Дашборд</title>
<style>
  :root {
    --dark:    #0D1117;
    --dark2:   #161B22;
    --dark3:   #1E2530;
    --border:  #30363D;
    --cyan:    #00BCD4;
    --success: #4CAF50;
    --warn:    #FFC107;
    --danger:  #F44336;
    --purple:  #AB47BC;
    --text:    #E6EDF3;
    --muted:   #8B949E;
    --radius:  10px;
    --gap:     12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform-origin: top left;
  }

  /* ШАПКА */
  .tv-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 56px;
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tv-logo { font-size: 28px; font-weight: 900; letter-spacing: .02em; }
  .tv-logo span { color: var(--cyan); }
  .tv-status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .tv-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
  .tv-time { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--cyan); }

  /* Выбор периода */
  .period-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .period-label { font-size: 13px; color: var(--muted); }
  .period-btn {
    padding: 5px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .period-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,188,212,.1); }
  .period-custom { display: flex; align-items: center; gap: 6px; margin-left: 10px; }
  .period-custom select {
    background: var(--dark3);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .period-custom select.active-sel { border-color: var(--cyan); }

  /* ТЕЛО */
  .tv-body {
    flex: 1;
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 130px 1fr 190px;
    gap: var(--gap);
    padding: var(--gap);
    overflow: hidden;
  }

  /* KPI плитки */
  .tv-kpi-row {
    grid-column: 1/-1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--gap);
  }
  .kpi-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 22px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .kpi-card.accent { border-color: var(--cyan); background: rgba(0,188,212,.08); }
  .kpi-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .kpi-val { font-size: 56px; font-weight: 900; line-height: 1; }
  .kpi-sub { font-size: 13px; color: var(--muted); }

  /* Техники */
  .tv-techs {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .techs-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    overflow-y: auto;
    align-content: start;
  }
  .tech-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .tech-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tech-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
  .tech-stat-val { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .tech-stat-lbl { font-size: 11px; color: var(--muted); }
  .tech-medal { position: absolute; top: 10px; right: 12px; font-size: 20px; }

  /* Узкие места */
  .tv-bottleneck {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #tvBottleneckContent { overflow-y: auto; flex: 1; }

  /* Тренд */
  .tv-trend {
    grid-column: 1/-1;
    grid-row: 3;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .trend-chart {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    overflow: hidden;
  }
  .chart-legend { display: flex; gap: 16px; margin-bottom: 6px; flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .chart-wrap { flex: 1; display: flex; align-items: flex-end; gap: 3px; justify-content: space-between; overflow: hidden; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 0; max-height: 100%; }
  .bar-group { width: 100%; display: flex; gap: 1px; align-items: flex-end; flex: 1; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 2px; transition: height .5s; }
  .chart-label { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; flex-shrink: 0; }
  .chart-val { font-size: 11px; color: var(--text); flex-shrink: 0; }

  /* Лоадер */
  #loader { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px;">Загрузка дашборда...</div>
</div>

<header class="tv-header">
  <div class="tv-logo">АВП <span>ТЕХНОЛОГИЯ</span></div>
  <div class="tv-status">
    <div class="tv-dot" id="statusDot"></div>
    <span id="statusText" style="color:var(--muted);">Обновление...</span>
  </div>
  <div class="tv-time" id="tvClock"></div>
</header>

<!-- Выбор периода -->
<div class="period-bar">
  <span class="period-label">Период:</span>
  <button class="period-btn active" id="btnCurMonth" onclick="setPeriod('month',this)">Этот месяц</button>
  <button class="period-btn" onclick="setPeriod('quarter',this)">Квартал</button>
  <button class="period-btn" onclick="setPeriod('year',this)">Год</button>
  <button class="period-btn" onclick="setPeriod('all',this)">Всё время</button>
  <div class="period-custom">
    <span class="period-label">Или выбери:</span>
    <select id="customMonth" onchange="setPeriodCustom()">
      <option value="1">Январь</option><option value="2">Февраль</option>
      <option value="3">Март</option><option value="4">Апрель</option>
      <option value="5">Май</option><option value="6">Июнь</option>
      <option value="7">Июль</option><option value="8">Август</option>
      <option value="9">Сентябрь</option><option value="10">Октябрь</option>
      <option value="11">Ноябрь</option><option value="12">Декабрь</option>
    </select>
    <select id="customYear" onchange="setPeriodCustom()">
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
    </select>
  </div>
  <span id="periodLabel" style="margin-left:12px;font-size:13px;color:var(--cyan);font-weight:700;"></span>
</div>

<div class="tv-body">

  <!-- KPI плитки -->
  <div class="tv-kpi-row" id="kpiRow">
    <div class="kpi-card accent">
      <div class="kpi-label">Всего ремонтов</div>
      <div class="kpi-val" id="kTotal">—</div>
      <div class="kpi-sub">за всё время</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">За период</div>
      <div class="kpi-val" id="kMonth">—</div>
      <div class="kpi-sub" id="kPeriodSub">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Активных</div>
      <div class="kpi-val" id="kActive" style="color:var(--warn);">—</div>
      <div class="kpi-sub">в работе сейчас</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Выдано за период</div>
      <div class="kpi-val" id="kIssued" style="color:var(--success);">—</div>
      <div class="kpi-sub">завершено</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Сегодня принято</div>
      <div class="kpi-val" id="kToday">—</div>
      <div class="kpi-sub" id="kDate">—</div>
    </div>
  </div>

  <!-- Техники -->
  <div class="tv-techs">
    <div class="section-title">👷 KPI сотрудников — <span id="techMonth">—</span></div>
    <div class="techs-grid" id="techsGrid"></div>
  </div>

  <!-- Узкие места -->
  <div class="tv-bottleneck">
    <div class="section-title">🚧 Узкие места — <span id="tvBottleneckMonth">—</span></div>
    <div id="tvBottleneckContent" style="overflow-y:auto;flex:1;"></div>
  </div>

  <!-- Тренд -->
  <div class="tv-trend">
    <div class="trend-chart">
      <div class="section-title" style="margin-bottom:4px;">📈 Тренд — <span id="trendMonth">—</span></div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--cyan);opacity:.7;"></div>Принято</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--success);opacity:.7;"></div>Выдано</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--danger);opacity:.7;"></div>Возврат</div>
      </div>
      <div class="chart-wrap" id="trendChart"></div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-n6-g_93fVP8hWTWnnngcblGleUKa_vAlVjaB9NyBUsLqULFdgSZM8nu_P306hKXq/exec';
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

// ── Масштаб ────────────────────────────────────────────────
const W = 1600, H = 900;
function rescale() {
  const sw = window.innerWidth || screen.width;
  const sh = window.innerHeight || screen.height;
  const scale = Math.min(sw/W, sh/H);
  document.body.style.transform = `scale(${scale})`;
  document.body.style.width  = W + 'px';
  document.body.style.height = H + 'px';
  const ox = Math.max(0, (sw - W*scale)/2);
  const oy = Math.max(0, (sh - H*scale)/2);
  document.body.style.marginLeft = ox + 'px';
  document.body.style.marginTop  = oy + 'px';
}
rescale();
window.addEventListener('resize', rescale);

// ── Часы ──────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d = now.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'long'});
  document.getElementById('tvClock').textContent = t + ' · ' + d;
}
setInterval(updateClock, 1000);
updateClock();

// ── Период ────────────────────────────────────────────────
let _period = 'month';  // по умолчанию — текущий месяц (онлайн)
let _customMonth = new Date().getMonth() + 1;
let _customYear  = new Date().getFullYear();

document.getElementById('customMonth').value = _customMonth;
document.getElementById('customYear').value  = _customYear;

function setPeriod(p, btn) {
  _period = p;
  // При выборе кнопки сбрасываем custom на текущий месяц
  if (p === 'month') {
    _customMonth = new Date().getMonth() + 1;
    _customYear  = new Date().getFullYear();
  }
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.period-custom select').forEach(s => s.classList.remove('active-sel'));
  if (btn) btn.classList.add('active');
  updatePeriodLabel();
  loadData();
}

function setPeriodCustom() {
  _period = 'custom';
  _customMonth = parseInt(document.getElementById('customMonth').value);
  _customYear  = parseInt(document.getElementById('customYear').value);
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.period-custom select').forEach(s => s.classList.add('active-sel'));
  updatePeriodLabel();
  loadData();
}

function updatePeriodLabel() {
  const el = document.getElementById('periodLabel');
  const now = new Date();
  const curMonthStr = MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  const labels = {
    month:   '🔴 LIVE · ' + curMonthStr,
    quarter: 'Q' + (Math.floor(now.getMonth()/3)+1) + ' ' + now.getFullYear(),
    year:    now.getFullYear() + ' год',
    all:     'За всё время',
    custom:  MONTHS[_customMonth-1] + ' ' + _customYear,
  };
  el.textContent = labels[_period] || '';
  el.style.color = _period === 'month' ? '#f44336' : 'var(--cyan)';
  // Обновляем заголовки
  const displayLbl = _period === 'month' ? curMonthStr : (labels[_period] || '');
  document.getElementById('techMonth').textContent = displayLbl;
  document.getElementById('tvBottleneckMonth').textContent = displayLbl;
  document.getElementById('trendMonth').textContent = displayLbl;
  document.getElementById('kPeriodSub').textContent = displayLbl;
  // Обновляем заголовок "Этот месяц"
  const curBtn = document.getElementById('btnCurMonth');
  if (curBtn) curBtn.textContent = curMonthStr;
}

function getPeriodParams() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const y = now.getFullYear();
  // Всегда передаём period + month + year для единообразия
  if (_period === 'month')   return `&period=month&month=${m}&year=${y}`;
  if (_period === 'custom')  return `&period=month&month=${_customMonth}&year=${_customYear}`;
  if (_period === 'quarter') return `&period=quarter&year=${y}`;
  if (_period === 'year')    return `&period=year&year=${y}`;
  if (_period === 'all')     return `&period=all`;
  return `&period=month&month=${m}&year=${y}`;
}

// ── Загрузка данных ───────────────────────────────────────
async function loadData() {
  try {
    const params = getPeriodParams();
    const r1 = await fetch(SCRIPT_URL + '?action=tvDashboard' + params + '&_=' + Date.now());
    const d  = await r1.json();
    if (!d.success) throw new Error(d.error);
    render(d);
    try {
      const r2 = await fetch(SCRIPT_URL + '?action=getBottleneck&sessionId=tv_public' + params + '&_=' + Date.now());
      const db = await r2.json();
      if (db.success) renderBottleneck(db);
    } catch(e) {}
    document.getElementById('statusDot').style.background = 'var(--success)';
    document.getElementById('statusText').textContent = 'Обновлено ' +
      new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('loader').style.display = 'none';
  } catch(e) {
    document.getElementById('statusDot').style.background = 'var(--danger)';
    document.getElementById('statusText').textContent = 'Ошибка: ' + e.message;
    document.getElementById('loader').style.display = 'none';
  }
}

function render(d) {
  if (!d || !d.totals) {
    console.warn('Нет данных от сервера');
    return;
  }
  document.getElementById('kTotal').textContent  = d.totals?.total  ?? '—';
  document.getElementById('kMonth').textContent  = d.totals?.month ?? d.totals?.total ?? '—';
  document.getElementById('kActive').textContent = d.totals?.active ?? '—';
  document.getElementById('kIssued').textContent = d.totals?.issued ?? '—';
  document.getElementById('kToday').textContent  = d.totals?.today  ?? '—';
  document.getElementById('kDate').textContent   = new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  renderTechs(d.techStats || []);
  renderTrend(d.trend || []);
  // Активные ремонты — обновляем счётчик
  if (d.totals) {
    document.getElementById('kActive').textContent = d.totals.active ?? '—';
    document.getElementById('kIssued').textContent = d.totals.issued ?? '—';
    document.getElementById('kToday').textContent  = d.totals.today  ?? '—';
    document.getElementById('kTotal').textContent  = d.totals.total  ?? '—';
  }
  if (d.bottleneck_data) renderBottleneck(d.bottleneck_data);
}

// ── Техники ───────────────────────────────────────────────
function renderTechs(techs) {
  const grid = document.getElementById('techsGrid');
  if (!techs.length) { grid.innerHTML = '<div style="color:var(--muted);padding:20px;">Нет данных</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  const sorted = [...techs].sort((a,b) => (b.repairs||b.done||0)-(a.repairs||a.done||0));
  const maxDone = Math.max(1, ...sorted.map(t=>t.repairs||t.done||0));
  grid.innerHTML = sorted.map((t,i) => {
    const eff = t.efficiency ?? (t.done > 0 ? Math.round(t.done/(t.done+(t.active||0))*100) : 0);
    const pct = Math.round((t.repairs||t.done||0)/maxDone*100);
    const c = eff >= 80 ? 'var(--success)' : eff >= 50 ? 'var(--warn)' : 'var(--danger)';
    return `<div class="tech-card" style="position:relative;border-color:${c}22;">
      ${i<3 ? `<div class="tech-medal">${medals[i]}</div>` : ''}
      <div class="tech-name">${t.name || t.username || '—'}</div>
      <div style="height:3px;background:var(--border);border-radius:2px;margin-bottom:8px;">
        <div style="height:100%;width:${pct}%;background:${c};border-radius:2px;"></div>
      </div>
      <div class="tech-stats">
        <div><div class="tech-stat-val" style="color:var(--cyan);">${t.repairs||t.done||0}</div><div class="tech-stat-lbl">ремонтов</div></div>
        <div><div class="tech-stat-val" style="color:${c};">${eff}%</div><div class="tech-stat-lbl">выполнено</div></div>
        <div><div class="tech-stat-val" style="color:var(--muted);font-size:18px;">${Math.round(t.hours||0)}ч</div><div class="tech-stat-lbl">часов</div></div>
        <div><div class="tech-stat-val" style="color:var(--success);font-size:18px;">${t.done||0}</div><div class="tech-stat-lbl">завершено</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Тренд ─────────────────────────────────────────────────
function renderTrend(trend) {
  const el = document.getElementById('trendChart');
  if (!trend.length) { el.innerHTML = '<div style="color:var(--muted);padding:20px;">Нет данных</div>'; return; }
  const maxV = Math.max(1, ...trend.flatMap(t=>[t.accepted||t.received||0,t.issued||0,t.returned||0]));
  el.innerHTML = trend.map(t => {
    const rH = Math.round((t.accepted||t.received||0)/maxV*100);
    const iH = Math.round((t.issued||0)/maxV*100);
    const retH = Math.round((t.returned||0)/maxV*100);
    const isCurrentMonth = t.isCurrent;
    return `<div class="chart-col">
      <div class="chart-val">${t.accepted||t.received||0}</div>
      <div class="bar-group">
        <div class="bar" style="height:${rH}%;background:rgba(0,188,212,.7);${isCurrentMonth?'border:1px solid var(--cyan);':''}"></div>
        <div class="bar" style="height:${iH}%;background:rgba(76,175,80,.7);"></div>
        ${retH>0?`<div class="bar" style="height:${retH}%;background:rgba(244,67,54,.7);"></div>`:''}
      </div>
      <div class="chart-label" style="color:${isCurrentMonth?'var(--cyan)':'var(--muted)'};">${t.label||''}</div>
    </div>`;
  }).join('');
}

// ── Узкие места ───────────────────────────────────────────
function renderBottleneck(d) {
  const el = document.getElementById('tvBottleneckContent');
  if (!el) return;
  const stages = d.stages || [];
  const maxMed = Math.max(1, ...stages.map(s=>s.median||0));
  let html = `<div style="background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.4);border-radius:8px;padding:8px 10px;margin-bottom:8px;">
    <div style="font-size:13px;color:#ef9a9a;">🚨 Главный тормоз</div>
    <div style="font-size:16px;font-weight:700;color:#f44336;">${d.bottleneck||'—'}</div>
    <div style="font-size:13px;color:#ef9a9a;">Полный цикл: ${d.cycleMedian||0}ч медиана</div>
  </div>`;
  stages.filter(s=>!s.key?.startsWith('pause')).forEach(s => {
    const isBN = s.key === d.bottleneckKey;
    const w = s.median>0 ? Math.max(4,Math.round(s.median/maxMed*100)) : 0;
    const color = isBN ? '#f44336' : 'var(--cyan)';
    html += `<div style="margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
        <span style="font-size:13px;color:var(--text);">${s.icon||''} ${s.name||''}</span>
        <span style="font-size:13px;font-weight:700;color:${color};">${s.median||0}ч</span>
      </div>
      <div style="height:6px;background:var(--dark3);border-radius:3px;">
        <div style="height:100%;width:${w}%;background:${color};border-radius:3px;"></div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

// ── Инициализация ─────────────────────────────────────────
updatePeriodLabel();
loadData();
// Автообновление только для текущего месяца (онлайн-мониторинг)
setInterval(() => {
  if (_period === 'month') {
    loadData();
  }
}, 120000);
</script>
